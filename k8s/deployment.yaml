apiVersion: apps/v1
kind: Deployment
metadata:
  name: ola-portfolio-app
  namespace: default
  labels:
    app: ola-portfolio-app
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ola-portfolio-app
  template:
    metadata:
      labels:
        app: ola-portfolio-app
        version: v1
    spec:
      serviceAccountName: workload-identity-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ola-portfolio-app
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        # Resource limits and requests
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        # Volume mounts for secrets from Key Vault
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
        # Environment variables (optional - can use secrets from Key Vault)
        env:
        - name: NODE_ENV
          value: "production"
      # Volumes for Secret Store CSI driver
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "azure-kv-secrets"
      # Pod disruption budget handled separately
      # Affinity rules for better distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ola-portfolio-app
              topologyKey: kubernetes.io/hostname
      # Tolerations (if needed for node pools)
      tolerations:
      - effect: NoSchedule
        key: workload
        operator: Equal
        value: "application"

# Argo CD UI ingress — https://argocd.olatunbosun.dev
# Do not kubectl apply this file directly. Use scripts/enable-argocd-ui.sh <your-public-ip>
# which waits for TLS, then adds nginx IP allowlisting (see docs/DOMAIN_SETUP.md).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.olatunbosun.dev
      secretName: argocd-olatunbosun-dev-tls
  rules:
    - host: argocd.olatunbosun.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80

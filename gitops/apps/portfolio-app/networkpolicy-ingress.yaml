# Allow NGINX Ingress Controller to reach portfolio pods (Cilium/network policy environments)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-portfolio
  namespace: portfolio-app
  labels:
    app: ola-portfolio-app
    managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app: ola-portfolio-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

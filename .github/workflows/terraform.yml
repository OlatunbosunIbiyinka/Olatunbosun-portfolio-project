name: Terraform Validation

# IaC validation and security (GitHub-hosted).
# PR: fmt + validate + Checkov (no Azure credentials required for validate).
# Push: plan against remote state via GitHub OIDC.

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_WORKING_DIR: infra/terraform
  TF_VAR_FILE: envs/dev/terraform.tfvars.example
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform-fmt-validate:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Checkov scan (Terraform)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./infra
          framework: terraform
          soft_fail: false
          config_file: ./infra/checkov.suppressions.yaml

  terraform-plan:
    name: Terraform plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - terraform-fmt-validate
      - checkov
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_CLI: "false"
      ARM_USE_MSI: "false"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: |
          # -refresh=false: private AKS API is not reachable from GitHub-hosted runners
          terraform plan \
            -refresh=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/plan.txt

# Cluster-wide Let's Encrypt issuer for olatunbosun.dev TLS
# ACME registration and API calls egress via NAT Gateway (UDR on aks-subnet).
# HTTP-01 challenge answers inbound on the ingress-nginx public LoadBalancer.
# Apply once after cert-manager is installed from the ops VM — see docs/DOMAIN_SETUP.md

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: olatunbosunkayode47@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx

# Public ingress for olatunbosun.dev
# Private platform by default: app Service stays ClusterIP; only this Ingress LB is public inbound.
# Outbound (ACME, etc.) uses NAT Gateway + UDR on the AKS subnet — see docs/DOMAIN_SETUP.md
# Requires: ingress-nginx + cert-manager + ClusterIssuer (ops VM install)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ola-portfolio-app-ingress
  namespace: portfolio-app
  labels:
    app: ola-portfolio-app
    managed-by: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - olatunbosun.dev
        - www.olatunbosun.dev
      secretName: olatunbosun-dev-tls
  rules:
    - host: olatunbosun.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ola-portfolio-app
                port:
                  number: 80
    - host: www.olatunbosun.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ola-portfolio-app
                port:
                  number: 80

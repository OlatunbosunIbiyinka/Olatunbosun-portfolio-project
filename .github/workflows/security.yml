name: Security Scans

on:
  workflow_run:
    workflows: ["CI - Build and Push Images"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  security-scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image tag artifact from CI
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: ci-build-push.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: image-tag
          path: .

      - name: Read image tag
        run: |
          echo "IMAGE=$(cat image-tag.txt)" >> $GITHUB_ENV
          echo "Image from CI: $(cat image-tag.txt)"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Trivy Vulnerability Scan (Image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          ignore-unfixed: true
          exit-code: "0"

      - name: Checkov IaC Scan (Terraform with suppressions)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./infra
          framework: terraform
          soft_fail: false
          config_file: ./infra/checkov.suppressions.yaml

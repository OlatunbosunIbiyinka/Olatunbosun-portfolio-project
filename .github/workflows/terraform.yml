name: Terraform Validation

# PR: fmt + validate (no Azure credentials required).
# Push: plan against remote state via GitHub OIDC (requires Storage Blob Data access on state account).

on:
  pull_request:
    branches:
      - main
      - develop
      - wip/deploy-vm-sync
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
      - develop
      - wip/deploy-vm-sync
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_WORKING_DIR: infra/terraform
  TF_VAR_FILE: envs/dev/terraform.tfvars.example
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform-fmt-validate:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  terraform-plan:
    name: Terraform plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: terraform-fmt-validate

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        id: plan
        run: |
          # -refresh=false: private AKS API is not reachable from GitHub-hosted runners
          terraform plan \
            -refresh=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/plan.txt

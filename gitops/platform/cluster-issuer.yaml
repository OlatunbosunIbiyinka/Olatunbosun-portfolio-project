# Cluster-wide Let's Encrypt issuer for olatunbosun.dev TLS
# Apply once after cert-manager is installed (see docs/DOMAIN_SETUP.md)

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: olatunbosunkayode47@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
